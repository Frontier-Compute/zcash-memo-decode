name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets

      - name: Run tests
        run: cargo test --all-targets

      - name: Run example
        run: cargo run --example wallet_integration

      - name: CLI smoke test
        run: |
          cargo run -- 68656c6c6f | grep "format: text"
